server:
  port: 8091

spring:
  datasource:
    url: jdbc:oracle:thin:@order-db:1521/FREEPDB1
    username: system
    password: "0000"
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka
